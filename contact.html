<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Lakhi Narayan Bharadwaj</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVIGATION -->
<header>
    <div class="logo">
        <a href="index.html">Lakhi Narayan Bharadwaj</a>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">About</a></li>
            <li><a href="research.html">Working Papers</a></li>
            <li><a href="conferences.html">Conferences</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- MAIN CONTENT -->
<main>

<!-- CONTACT -->
<section id="contact" class="contact-section">
    <div class="contact-container">

        <!-- LEFT SIDE -->
        <div class="contact-left">
            <h2>Contact</h2>

            <div class="contact-info">

                <div class="info-item">
                    <div class="info-icon">✉</div>
                    <p>lnarayan@iitg.ac.in</p>
                </div>

                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <p>IIT Guwahati, Assam 781039, India</p>
                </div>

            </div>

            <div class="contact-links">
                <a href="https://www.linkedin.com/in/lanarbha/" target="_blank">LinkedIn</a>
                <a href="https://github.com/lnbharadwaj" target="_blank">GitHub</a>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="contact-form">
            <h3>Send a Message</h3>

            <form id="contact-form" action="https://formspree.io/f/mbdawqpp" method="POST">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="text" name="subject" placeholder="Subject">
                <textarea name="message" placeholder="Message" required></textarea>
                <button type="submit">Send</button>
            </form>

        </div>

    </div>
</section>

</main>

<!-- FOOTER -->
<div class="footer-bottom">
    © 2026 Lakhi Narayan Bharadwaj. All rights reserved.
</div>

<!-- SCRIPT -->
<script>
const form = document.getElementById("contact-form");

form.addEventListener("submit", async function(event) {
    event.preventDefault();

    const formData = new FormData(form);

    const response = await fetch(form.action, {
        method: form.method,
        body: formData,
        headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
        alert("Message sent successfully!");
        form.reset();
    } else {
        alert("Oops! Something went wrong.");
    }
});
</script>

</body>
</html>
